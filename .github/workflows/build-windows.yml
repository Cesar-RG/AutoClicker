name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run ruff check .

  type-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run mypy -p autoclicker

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run pytest -v

  build:
    needs: [test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group build
      - run: >
          uv run pyinstaller --onefile --windowed --name AutoClicker --noconsole
          --hidden-import autoclicker.config
          --hidden-import autoclicker.thread
          --hidden-import autoclicker.window
          --hidden-import autoclicker.hotkeys_windows
          autoclicker.py
      - uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-Windows
          path: dist/AutoClicker.exe
