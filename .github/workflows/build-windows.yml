name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group build --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy autoclicker.py

      - name: Run tests
        run: uv run pytest -v

      - name: Build EXE
        run: uv run pyinstaller --onefile --windowed --name AutoClicker --noconsole autoclicker.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-Windows
          path: dist/AutoClicker.exe
