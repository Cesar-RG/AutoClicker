name: Build Linux Binary

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  QT_QPA_PLATFORM: offscreen

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run ruff check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run mypy -p autoclicker

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - uses: astral-sh/setup-uv@v4
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-shape0
      - run: uv sync --group dev
      - run: uv run pytest -v

  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - uses: astral-sh/setup-uv@v4
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-shape0
      - run: uv sync --group build
      - run: >
          uv run pyinstaller --onefile --windowed --name AutoClicker
          --hidden-import autoclicker.config
          --hidden-import autoclicker.thread
          --hidden-import autoclicker.window
          --hidden-import autoclicker.hotkeys_unix
          autoclicker.py
      - uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-Linux
          path: dist/AutoClicker
