name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - run: uv sync --group build

      - run: uv run pytest -v

      - run: uv run pyinstaller --onefile --windowed --name AutoClicker --noconsole autoclicker.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-Windows
          path: dist/AutoClicker.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - run: uv sync --group build

      - run: uv run pytest -v

      - run: uv run pyinstaller --onefile --windowed --name AutoClicker autoclicker.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-Linux
          path: dist/AutoClicker

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: AutoClicker-Windows
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: AutoClicker-Linux
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/AutoClicker.exe
            artifacts/AutoClicker
          generate_release_notes: true
